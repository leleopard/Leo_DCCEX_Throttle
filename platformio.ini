[common]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    madhephaestus/ESP32Encoder@^0.11.5
    https://github.com/DCC-EX/DCCEXProtocol.git
build_flags =
    -D USER_SETUP_LOADED=1
    -D TFT_MISO=19
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=-1
    -D TFT_DC=2
    -D TFT_RST=4
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1

; ── 320×240 ILI9341 (original display) ─────────────────────────────────────
[env:ili9341]
extends = common
build_flags =
    ${common.build_flags}
    -D ILI9341_DRIVER=1
    -D SPI_FREQUENCY=40000000
    -D DISPLAY_480=0

; ── 480×320 ST7796 with XPT2046 resistive touch ────────────────────────────
; Update TOUCH_CS to match your wiring before flashing.
[env:st7796]
extends = common
build_flags =
    ${common.build_flags}
    -D ST7796_DRIVER=1
    -D SPI_FREQUENCY=27000000
    -D DISPLAY_480=1
    -D TOUCH_CS=5
    -D TOUCH_DRIVER=2046
